desktop:
  context:
    max_length: 8000
    use_mouse_position: true
  enabled: true
  ghost_text:
    alpha: 0.8
    color: '#aaaaaa'
    font_size: 14
engine:
  api:
    api_key: test-key
    base_url: https://api.deepseek.com/v1
    model_id: deepseek-chat
  model_path: Qwen/Qwen3-1.7B-Base
  type: exllama
generation:
  max_tokens: 64
  repetition_penalty: 1.1
  temperature: 0.7
  top_k: 40
  top_p: 0.9
logging:
  backup_count: 5
  file: data/logs/copilot.log
  level: INFO
  max_size_mb: 10
memory:
  context_enhancement:
    enabled: true
    max_relevant: 5
    similarity_threshold: 0.6
  db_path: data/copilot.db
  enabled: true
  max_history: 1000
server:
  host: 127.0.0.1
  port: 7891
  reload: false
trigger:
  accept_key: tab
  auto_trigger:
    enabled: true
    min_context_length: 3
  debounce_ms: 300
  reject_key: esc
