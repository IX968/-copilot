<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Copilot - 控制台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- 侧边导航栏 -->
        <nav class="sidebar">
            <div class="logo">
                <h1>🚀 AI Copilot</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span class="text">仪表板</span>
                </li>
                <li class="nav-item" data-page="models">
                    <span class="icon">🤖</span>
                    <span class="text">模型管理</span>
                </li>
                <li class="nav-item" data-page="settings">
                    <span class="icon">⚙️</span>
                    <span class="text">配置中心</span>
                </li>
                <li class="nav-item" data-page="memory">
                    <span class="icon">🧠</span>
                    <span class="text">记忆库</span>
                </li>
                <li class="nav-item" data-page="logs">
                    <span class="icon">📝</span>
                    <span class="text">日志</span>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot" id="apiStatus"></span>
                    <span id="apiStatusText">连接中...</span>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 仪表板页面 -->
            <section id="page-dashboard" class="page active">
                <h2>状态概览</h2>

                <div class="status-cards">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">🟢</span>
                            <span class="card-title">服务状态</span>
                        </div>
                        <div class="card-value" id="serviceStatus">检查中...</div>
                        <div class="card-subtitle" id="serviceUptime">运行时间：--</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">🎮</span>
                            <span class="card-title">GPU 状态</span>
                        </div>
                        <div class="card-value" id="gpuUsage">--%</div>
                        <div class="card-subtitle" id="gpuMemory">显存：-- / -- GB</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">🧠</span>
                            <span class="card-title">已加载模型</span>
                        </div>
                        <div class="card-value" id="loadedModel">--</div>
                        <div class="card-subtitle" id="modelType">--</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="card-icon">⚡</span>
                            <span class="card-title">生成统计</span>
                        </div>
                        <div class="card-value" id="totalRequests">0</div>
                        <div class="card-subtitle" id="avgLatency">平均延迟：-- ms</div>
                    </div>
                </div>

                <div class="chart-section">
                    <h3>使用统计（24 小时）</h3>
                    <div class="chart-placeholder" id="usageChart">
                        <p>图表数据收集中...</p>
                    </div>
                </div>
            </section>

            <!-- 模型管理页面 -->
            <section id="page-models" class="page">
                <h2>模型管理</h2>

                <div class="model-actions">
                    <button class="btn btn-primary" onclick="scanModels()">🔍 扫描模型</button>
                    <button class="btn btn-secondary" onclick="alert('功能开发中')">📥 下载模型</button>
                    <button class="btn btn-secondary" onclick="alert('功能开发中')">📤 上传模型</button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>模型名称</th>
                                <th>类型</th>
                                <th>大小</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="modelsTableBody">
                            <tr>
                                <td colspan="5" class="empty-state">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 配置中心页面 -->
            <section id="page-settings" class="page">
                <h2>配置中心</h2>

                <div class="settings-section">
                    <h3>引擎选择</h3>
                    <div class="form-group">
                        <label for="engineType">引擎类型</label>
                        <select id="engineType">
                            <option value="transformer">Transformer</option>
                            <option value="exllama">ExLlamaV2 (开发中)</option>
                            <option value="api">云端 API (开发中)</option>
                        </select>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>生成参数</h3>
                    <div class="form-group">
                        <label for="temperature">Temperature: <span id="temperatureValue">0.7</span></label>
                        <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="0.7">
                    </div>
                    <div class="form-group">
                        <label for="maxTokens">Max Tokens: <span id="maxTokensValue">64</span></label>
                        <input type="range" id="maxTokens" min="16" max="512" step="16" value="64">
                    </div>
                    <div class="form-group">
                        <label for="topK">Top-K: <span id="topKValue">40</span></label>
                        <input type="range" id="topK" min="1" max="100" step="1" value="40">
                    </div>
                    <div class="form-group">
                        <label for="topP">Top-P: <span id="topPValue">0.9</span></label>
                        <input type="range" id="topP" min="0.1" max="1.0" step="0.05" value="0.9">
                    </div>
                </div>

                <div class="settings-section">
                    <h3>触发设置</h3>
                    <div class="form-group">
                        <label for="debounceMs">防抖时间 (ms): <span id="debounceMsValue">300</span></label>
                        <input type="range" id="debounceMs" min="100" max="1000" step="50" value="300">
                    </div>
                    <div class="form-group">
                        <label for="acceptKey">接受键</label>
                        <select id="acceptKey">
                            <option value="tab">Tab</option>
                            <option value="enter">Enter</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                    <button class="btn btn-secondary" onclick="resetConfig()">🔄 重置默认</button>
                    <button class="btn btn-secondary" onclick="reloadConfig()">📥 重新加载</button>
                </div>
            </section>

            <!-- 记忆库页面 -->
            <section id="page-memory" class="page">
                <h2>记忆库</h2>
                <div class="memory-search">
                    <input type="text" class="search-input" placeholder="搜索记忆...">
                    <button class="btn btn-primary">🔍 搜索</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>应用</th>
                                <th>输入</th>
                                <th>输出</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="memoryTableBody">
                            <tr>
                                <td colspan="5" class="empty-state">记忆功能开发中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 日志页面 -->
            <section id="page-logs" class="page">
                <h2>系统日志</h2>
                <div class="log-controls">
                    <button class="btn btn-secondary" onclick="clearLogs()">🗑️ 清空</button>
                    <button class="btn btn-secondary" onclick="exportLogs()">📥 导出</button>
                </div>
                <div class="log-container" id="logContainer">
                    <div class="log-entry info">[系统] 正在连接日志服务...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
